name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # eslint without --fix: fail on errors, do not mutate the tree in CI.
      # Warnings do not fail the build (the repo currently has many).
      - name: Lint
        run: npx eslint --ext .js,.jsx,.ts,.tsx --ignore-path .gitignore .

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      # Dependency vulnerability scan. Non-blocking: the pinned ~2020 stack has
      # known advisories that are addressed by the planned upgrades, not here.
      # Surfaces high+ issues in the log without failing the build.
      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # webServer in playwright.config.ts boots the app via `npm run start:local`.
      - name: Playwright UI-integration tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright/report/
          retention-days: 7
