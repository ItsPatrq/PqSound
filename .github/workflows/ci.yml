name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      # eslint without --fix: fail on errors, do not mutate the tree in CI.
      # Warnings do not fail the build (the repo currently has many).
      - name: Lint
        run: npx eslint --ext .js,.jsx,.ts,.tsx --ignore-path .gitignore .

      - name: Unit tests
        run: npm test

      # Dependency vulnerability scan. Non-blocking: the pinned ~2020 stack has
      # known advisories that are addressed by the planned upgrades, not here.
      # Surfaces high+ issues in the log without failing the build.
      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build
