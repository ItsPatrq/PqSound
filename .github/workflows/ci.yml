name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # eslint without --fix: fail on errors, do not mutate the tree in CI.
      # Warnings do not fail the build (the repo currently has many).
      - name: Lint
        run: npx eslint --ext .js,.jsx,.ts,.tsx --ignore-path .gitignore .

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
